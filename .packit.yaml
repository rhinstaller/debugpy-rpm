specfile_path: python3-debugpy.spec

# Upstream project configuration
upstream_project_url: https://github.com/microsoft/debugpy
upstream_package_name: debugpy
downstream_package_name: python3-debugpy

jobs:
  # Build on commits to main
  - job: copr_build
    trigger: commit
    branch: main
    targets:
      - epel-10
      - epel-9
      - fedora-44
      - fedora-eln
      - fedora-rawhide
    owner: "@rhinstaller"
    project: devutils
    preserve_project: true

  # Build on pull requests (temporary test builds)
  - job: copr_build
    trigger: pull_request
    targets:
      - epel-10
      - epel-9
      - fedora-44
      - fedora-eln
      - fedora-rawhide
    owner: "@rhinstaller"
    project: devutils

# Download source from PyPI and output the archive filename
actions:
  create-archive:
    - bash -c "spectool -g -C . python3-debugpy.spec >/dev/null && ls debugpy-*.tar.gz"

# Dependencies needed for downloading sources
srpm_build_deps:
  - rpmdevtools

files_to_sync:
  - .packit.yaml
  - python3-debugpy.spec

# Merge changes automatically if tests pass (optional)
merge_pr_in_ci: false
