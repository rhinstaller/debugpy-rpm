name: Check for Upstream Updates

on:
  schedule:
    # Run every Friday at midnight UTC
    - cron: '0 0 * * 5'
  workflow_dispatch:

permissions:
  contents: write       # Required to create branch and commit changes
  pull-requests: write  # Required to create pull request

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dnf install -y jq curl rpmdevtools

      - name: Check for new version
        id: check
        run: |
          ./check-upstream.sh || echo "update_needed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Get version info
        if: steps.check.outputs.update_needed == 'true'
        id: versions
        run: |
          CURRENT=$(grep "^%global pypi_version" python-debugpy.spec | awk '{print $3}')
          LATEST=$(curl -s "https://pypi.org/pypi/debugpy/json" | jq -r '.info.version')
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$LATEST" >> $GITHUB_OUTPUT

      - name: Update spec file
        if: steps.check.outputs.update_needed == 'true'
        run: |
          LATEST="${{ steps.versions.outputs.latest }}"

          # Update version
          sed -i "s/^%global pypi_version .*/%global pypi_version $LATEST/" python-debugpy.spec

          # Add changelog entry
          DATE=$(date +"%a %b %d %Y")
          CHANGELOG_ENTRY="* $DATE GitHub Actions <noreply@github.com> - $LATEST-1\n- Update to upstream version $LATEST"

          # Insert after %changelog line
          sed -i "/^%changelog/a $CHANGELOG_ENTRY" python-debugpy.spec

      - name: Create Pull Request
        if: steps.check.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update to debugpy ${{ steps.versions.outputs.latest }}"
          branch: update-debugpy-${{ steps.versions.outputs.latest }}
          delete-branch: true
          title: "Update to debugpy ${{ steps.versions.outputs.latest }}"
          body: |
            ## Upstream Update

            New version of debugpy is available on PyPI.

            - **Current version**: ${{ steps.versions.outputs.current }}
            - **New version**: ${{ steps.versions.outputs.latest }}
            - **PyPI**: https://pypi.org/project/debugpy/${{ steps.versions.outputs.latest }}/
            - **GitHub Release**: https://github.com/microsoft/debugpy/releases/tag/v${{ steps.versions.outputs.latest }}

            This PR was automatically created by the weekly upstream check workflow.

            ### Changes
            - Updated `%global pypi_version` to ${{ steps.versions.outputs.latest }}
            - Added changelog entry

            ### Testing
            Packit will automatically build this in COPR for review.
          labels: |
            automated
            upstream-update
